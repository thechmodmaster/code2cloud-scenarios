name: C2C Vulnerable Container Build & Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_to_aks:
        description: 'Deploy to AKS after pushing to ACR'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  ACR_NAME: c2cscenarioacr
  IMAGE_NAME: c2cscenario/vuln-app
  IMAGE_NAME_API: c2cscenario/vuln-api
  RESOURCE_GROUP: c2cscenario-rg
  AKS_CLUSTER: c2cscenario-aks
  K8S_NAMESPACE: c2c-scenarios

jobs:
  build-push-deploy:
    runs-on: [self-hosted, linux, x64, c2c-runner]
    
    permissions:
      id-token: write    # Required for OIDC
      contents: read     # Required for checkout
      security-events: write    # Required for uploading SARIF scan results
    
    steps:
      # Step 1: Checkout the repository — C2C maps this repo to the workflow run
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: OIDC login — no static secrets. C2C correlates the identity to this workflow.
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      # Step 3: Login to ACR using the Azure session (az acr login works with OIDC)
      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}
      
      # Step 4: Deterministic tags enable C2C to correlate: commit → workflow → image
      - name: Generate Image Tags
        id: image-tags
        run: |
          echo "COMMIT_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "RUN_TAG=run-${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "VULN_TAG=vuln-ajv-CVE-2020-15366" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=latest" >> $GITHUB_OUTPUT
          echo "Generated tags for C2C correlation:"
          echo "  - Commit SHA: ${{ github.sha }}"
          echo "  - Workflow Run: run-${{ github.run_id }}"
          echo "  - Vulnerability: vuln-ajv-CVE-2020-15366"
          echo "  - Latest: latest"
      
      # Step 5: Build with full OCI labels so C2C can trace image → repo → workflow
      - name: Build and Push Docker Image
        id: build-push
        run: |
          IMAGE_URI="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}"
          
          # Build with multiple tags and OCI annotations
          docker build \
            --tag "${IMAGE_URI}:${{ steps.image-tags.outputs.COMMIT_TAG }}" \
            --tag "${IMAGE_URI}:${{ steps.image-tags.outputs.RUN_TAG }}" \
            --tag "${IMAGE_URI}:${{ steps.image-tags.outputs.VULN_TAG }}" \
            --tag "${IMAGE_URI}:${{ steps.image-tags.outputs.LATEST_TAG }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.ref.name=${{ github.ref_name }}" \
            --label "com.c2c.workflow.run-id=${{ github.run_id }}" \
            --label "com.c2c.workflow.run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "com.c2c.vulnerability.scenario=ajv-CVE-2020-15366" \
            ./scenarios/vulnerable-container
          
          # Push all tags
          docker push "${IMAGE_URI}:${{ steps.image-tags.outputs.COMMIT_TAG }}"
          docker push "${IMAGE_URI}:${{ steps.image-tags.outputs.RUN_TAG }}"
          docker push "${IMAGE_URI}:${{ steps.image-tags.outputs.VULN_TAG }}"
          docker push "${IMAGE_URI}:${{ steps.image-tags.outputs.LATEST_TAG }}"
          
          echo "✅ Image pushed with 4 tags and full C2C correlation labels"
      
      # Step 6: Capture the immutable digest — this is the key correlation anchor for C2C
      - name: Capture Image Digest
        id: digest
        run: |
          IMAGE_URI="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}"
          
          # Inspect the image and extract the digest
          FULL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_URI}:${{ steps.image-tags.outputs.COMMIT_TAG }}")
          DIGEST=$(echo "$FULL_DIGEST" | cut -d'@' -f2)
          
          # Export to environment for subsequent steps
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "FULL_IMAGE_URI=${IMAGE_URI}@${DIGEST}" >> $GITHUB_ENV
          
          # Also set as step output
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "full_uri=${IMAGE_URI}@${DIGEST}" >> $GITHUB_OUTPUT
          
          echo "📌 Captured immutable digest: $DIGEST"
      
      # Step 7: Generate tags for the second image (vuln-api)
      - name: Generate API Image Tags
        id: api-image-tags
        run: |
          echo "COMMIT_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "RUN_TAG=run-${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "VULN_TAG_AJV=vuln-ajv-CVE-2020-15366" >> $GITHUB_OUTPUT
          echo "VULN_TAG_LODASH=vuln-lodash-CVE-2020-8203" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=latest" >> $GITHUB_OUTPUT
          echo "Generated tags for vuln-api (C2C correlation):"
          echo "  - Commit SHA: ${{ github.sha }}"
          echo "  - Workflow Run: run-${{ github.run_id }}"
          echo "  - Vulnerability 1: vuln-ajv-CVE-2020-15366"
          echo "  - Vulnerability 2: vuln-lodash-CVE-2020-8203"
          echo "  - Latest: latest"
      
      # Step 8: Build vuln-api with OCI labels — same repo+run correlation as vuln-app
      - name: Build and Push API Docker Image
        id: build-push-api
        run: |
          IMAGE_URI="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_API }}"
          
          # Build with multiple tags and OCI annotations
          docker build \
            --tag "${IMAGE_URI}:${{ steps.api-image-tags.outputs.COMMIT_TAG }}" \
            --tag "${IMAGE_URI}:${{ steps.api-image-tags.outputs.RUN_TAG }}" \
            --tag "${IMAGE_URI}:${{ steps.api-image-tags.outputs.VULN_TAG_AJV }}" \
            --tag "${IMAGE_URI}:${{ steps.api-image-tags.outputs.VULN_TAG_LODASH }}" \
            --tag "${IMAGE_URI}:${{ steps.api-image-tags.outputs.LATEST_TAG }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.ref.name=${{ github.ref_name }}" \
            --label "com.c2c.workflow.run-id=${{ github.run_id }}" \
            --label "com.c2c.workflow.run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "com.c2c.vulnerability.scenario=ajv-CVE-2020-15366,lodash-CVE-2020-8203" \
            ./scenarios/vulnerable-api
          
          # Push all tags
          docker push "${IMAGE_URI}:${{ steps.api-image-tags.outputs.COMMIT_TAG }}"
          docker push "${IMAGE_URI}:${{ steps.api-image-tags.outputs.RUN_TAG }}"
          docker push "${IMAGE_URI}:${{ steps.api-image-tags.outputs.VULN_TAG_AJV }}"
          docker push "${IMAGE_URI}:${{ steps.api-image-tags.outputs.VULN_TAG_LODASH }}"
          docker push "${IMAGE_URI}:${{ steps.api-image-tags.outputs.LATEST_TAG }}"
          
          echo "✅ API image pushed with 5 tags and full C2C correlation labels"
      
      # Step 9: Capture the immutable digest for vuln-api
      - name: Capture API Image Digest
        id: api-digest
        run: |
          IMAGE_URI="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_API }}"
          
          # Inspect the image and extract the digest
          FULL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE_URI}:${{ steps.api-image-tags.outputs.COMMIT_TAG }}")
          DIGEST=$(echo "$FULL_DIGEST" | cut -d'@' -f2)
          
          # Export to environment for subsequent steps
          echo "API_IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "API_FULL_IMAGE_URI=${IMAGE_URI}@${DIGEST}" >> $GITHUB_ENV
          
          # Also set as step output
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "full_uri=${IMAGE_URI}@${DIGEST}" >> $GITHUB_OUTPUT
          
          echo "📌 Captured vuln-api immutable digest: $DIGEST"
      
      # C2C Build Card: Scan image for vulnerabilities — results uploaded to GitHub Code Scanning
      # This enables C2C to map: pipeline → vulnerability assessment (Build card)
      - name: Scan vuln-app Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.image-tags.outputs.COMMIT_TAG }}'
          format: 'sarif'
          output: 'vuln-app-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
      
      # C2C Build Card: Scan image for vulnerabilities — results uploaded to GitHub Code Scanning
      # This enables C2C to map: pipeline → vulnerability assessment (Build card)
      - name: Scan vuln-api Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_API }}:${{ steps.api-image-tags.outputs.COMMIT_TAG }}'
          format: 'sarif'
          output: 'vuln-api-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
      
      # Upload SARIF files separately with unique categories (required by CodeQL Action)
      - name: Upload vuln-app Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'vuln-app-results.sarif'
          category: 'container-scanning-vuln-app'

      - name: Upload vuln-api Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'vuln-api-results.sarif'
          category: 'container-scanning-vuln-api'
      
      # Step 10: This summary is what C2C systems parse from workflow logs
      - name: Print Correlation Summary
        run: |
          echo "============================================"
          echo "C2C CORRELATION SUMMARY"
          echo "============================================"
          echo "Repository:    ${{ github.repository }}"
          echo "Commit SHA:    ${{ github.sha }}"
          echo "Workflow Run:  ${{ github.run_id }}"
          echo "--------------------------------------------"
          echo "Image 1 (vuln-app):"
          echo "  URI:         ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  Digest:      ${{ steps.digest.outputs.digest }}"
          echo "  Full URI:    ${{ steps.digest.outputs.full_uri }}"
          echo "  Vulnerability: ajv@6.12.2 (CVE-2020-15366)"
          echo "--------------------------------------------"
          echo "Image 2 (vuln-api):"
          echo "  URI:         ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_API }}:${{ github.sha }}"
          echo "  Digest:      ${{ steps.api-digest.outputs.digest }}"
          echo "  Full URI:    ${{ steps.api-digest.outputs.full_uri }}"
          echo "  Vulnerabilities: ajv@6.12.2 (CVE-2020-15366), lodash@4.17.15 (CVE-2020-8203)"
          echo "--------------------------------------------"
          echo "ACR:           ${{ env.ACR_NAME }}.azurecr.io"
          echo "============================================"
      
      # Step 11: Set AKS context for kubectl commands (conditional)
      - name: Set AKS Context
        if: github.event.inputs.deploy_to_aks == 'true'
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ env.AKS_CLUSTER }}
          resource-group: ${{ env.RESOURCE_GROUP }}
      
      # Step 12: Deploy both images using digest references for full C2C correlation
      - name: Deploy to AKS
        if: github.event.inputs.deploy_to_aks == 'true'
        run: |
          # Apply K8s manifests for vuln-app
          kubectl apply -f scenarios/vulnerable-container/k8s/ -n ${{ env.K8S_NAMESPACE }}
          
          # Apply K8s manifests for vuln-api
          kubectl apply -f scenarios/vulnerable-api/k8s/ -n ${{ env.K8S_NAMESPACE }}
          
          # Patch vuln-app deployment to use the exact image with digest
          kubectl set image deployment/vuln-app \
            vuln-app=${{ steps.digest.outputs.full_uri }} \
            -n ${{ env.K8S_NAMESPACE }}
          
          # Patch vuln-api deployment to use the exact image with digest
          kubectl set image deployment/vuln-api \
            vuln-api=${{ steps.api-digest.outputs.full_uri }} \
            -n ${{ env.K8S_NAMESPACE }}
          
          # Wait for both rollouts to complete
          echo "⏳ Waiting for vuln-app deployment rollout..."
          kubectl rollout status deployment/vuln-app \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s
          
          echo "⏳ Waiting for vuln-api deployment rollout..."
          kubectl rollout status deployment/vuln-api \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s
          
          echo "✅ Both deployments complete using digest-based image references"
      
      # Step 13: Verify both deployed pods use the exact image URI/digest
      - name: Verify Deployment
        if: github.event.inputs.deploy_to_aks == 'true'
        run: |
          echo "📋 Running pod information:"
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          
          echo ""
          echo "🔍 Deployed image URIs:"
          echo "  vuln-app:"
          kubectl get deployment vuln-app \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""
          echo "  vuln-api:"
          kubectl get deployment vuln-api \
            -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""
          
          # Verify digests for both deployments
          for DEPLOY in vuln-app vuln-api; do
            DEPLOYED_IMAGE=$(kubectl get deployment $DEPLOY \
              -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.spec.template.spec.containers[0].image}')
            
            if [[ "$DEPLOYED_IMAGE" == *"@sha256:"* ]]; then
              echo "✅ $DEPLOY uses digest-based reference (C2C-compliant)"
            else
              echo "⚠️  Warning: $DEPLOY uses tag-based reference"
            fi
          done
      
      # Step 14: Export outputs for GitHub UI and downstream jobs
      - name: Export Outputs
        if: always()
        run: |
          # Write job summary to GitHub UI
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🐳 C2C Container Build & Deploy Summary
          
          ### Image 1: vuln-app
          | Property | Value |
          |----------|-------|
          | **Image URI** | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}\` |
          | **Image Digest** | \`${{ steps.digest.outputs.digest }}\` |
          | **Full URI** | \`${{ steps.digest.outputs.full_uri }}\` |
          | **Vulnerability** | ajv@6.12.2 (CVE-2020-15366) |
          
          ### Image 2: vuln-api
          | Property | Value |
          |----------|-------|
          | **Image URI** | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_API }}:${{ github.sha }}\` |
          | **Image Digest** | \`${{ steps.api-digest.outputs.digest }}\` |
          | **Full URI** | \`${{ steps.api-digest.outputs.full_uri }}\` |
          | **Vulnerabilities** | ajv@6.12.2 (CVE-2020-15366), lodash@4.17.15 (CVE-2020-8203) |
          
          ### Tags Applied (both images)
          - \`${{ github.sha }}\` (commit SHA)
          - \`run-${{ github.run_id }}\` (workflow run ID)
          - \`vuln-ajv-CVE-2020-15366\` (shared vulnerability scenario)
          - \`latest\` (convenience tag)
          - \`vuln-lodash-CVE-2020-8203\` (vuln-api only)
          
          ### C2C Multi-Image Correlation Chain
          | Step | Value |
          |------|-------|
          | **Repository** | \`${{ github.repository }}\` |
          | **Commit SHA** | [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | **Workflow Run** | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Image 1 (vuln-app)** | \`${{ steps.digest.outputs.full_uri }}\` |
          | **Image 2 (vuln-api)** | \`${{ steps.api-digest.outputs.full_uri }}\` |
          | **Shared Vuln** | ajv@6.12.2 (CVE-2020-15366) |
          | **API-only Vuln** | lodash@4.17.15 (CVE-2020-8203) |
          
          ### Deployment Status
          - **AKS Deployment**: ${{ github.event.inputs.deploy_to_aks == 'true' && '✅ Enabled' || '⏭️  Skipped' }}
          - **Cluster**: \`${{ env.AKS_CLUSTER }}\`
          - **Namespace**: \`${{ env.K8S_NAMESPACE }}\`
          - **Deployments**: vuln-app, vuln-api
          
          ---
          
          ### 🔗 C2C Multi-Image Mapping Flow
          \`\`\`
          GitHub Repo → Workflow Run → Image 1 (vuln-app) → AKS Workload → CVE-2020-15366
                                     → Image 2 (vuln-api) → AKS Workload → CVE-2020-15366 + CVE-2020-8203
          \`\`\`
          
          This workflow enables Code2Cloud to correlate:
          1. **Multiple images** from the **same pipeline run** (shared run ID)
          2. **Multiple images** from the **same repo** (shared commit SHA)
          3. **Shared vulnerabilities** across containers (ajv CVE-2020-15366)
          4. **Unique vulnerabilities** per container (lodash CVE-2020-8203 in vuln-api)
          5. **Source code** → **Build pipeline** → **Container images** → **K8s workloads**
          EOF
